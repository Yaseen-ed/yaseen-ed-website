    <!-- Interactive Logic JavaScript -->
    <script>
        // 1. FILTER FUNCTION WITH ACTIVE BUTTON STATE
        function filterGallery(category, buttonElement) {
            // Saare items ko filter karein
            const items = document.querySelectorAll('.item');
            items.forEach(item => {
                if (category === 'all' || item.classList.contains(category)) {
                    item.style.display = 'block';
                } else {
                    item.style.display = 'none';
                }
            });

            // Buttons ke styling state ko manage karein
            document.querySelectorAll('.gallery-btn').forEach(btn => {
                btn.classList.remove('bg-[#B59410]', 'text-white');
                btn.classList.add('bg-white', 'border', 'border-gray-200');
            });
            buttonElement.classList.remove('bg-white', 'border', 'border-gray-200');
            buttonElement.classList.add('bg-[#B59410]', 'text-white');
        }

        // 2. OPEN POPUP WINDOW (TOUCH EVENT)
        function openLightbox(element) {
            const imgSrc = element.querySelector('img').src;
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const lightboxDownload = document.getElementById('lightbox-download');

            // Set source
            lightboxImg.src = imgSrc;
            lightboxDownload.href = imgSrc; // Image url hi link banega taaki download ho sake

            // Unhide modal window
            lightbox.classList.remove('hidden');
            document.body.style.overflow = 'hidden'; // Background scroll stop karne ke liye
        }

        // 3. CLOSE POPUP WINDOW
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('hidden');
            document.body.style.overflow = 'auto'; // Scroll vapas normal karne ke liye
        }
    </script>
